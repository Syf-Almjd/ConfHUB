{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 3rem; text-align: center;">
    <h4
        style="color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; font-weight: 700;">
        Academic Excellence</h4>
    <h1>Submit Research Article</h1>
    <p style="color: var(--text-secondary); max-width: 500px; margin: 1rem auto;">Present your scientific findings to
        the global community by submitting your research paper through our unified portal.</p>
</div>

<div class="card" style="max-width: 750px; margin: 0 auto; border-top: 5px solid var(--accent-color);">
    <form action="{{ url_for('submit_article') }}" method="POST">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="article_id">Article Reference ID</label>
                <input type="text" id="article_id" name="article_id" placeholder="e.g. ART-001" required>
            </div>
            <div class="form-group">
                <label for="category">Submission Category</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select category...</option>
                    <option value="research_paper">Research Paper</option>
                    <option value="industrial_paper">Industrial Paper</option>
                    <option value="tutorial">Tutorial</option>
                    <option value="short_paper">Short Paper</option>
                    <option value="poster">Poster</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="title">Full Manuscript Title</label>
            <textarea id="title" name="title" rows="3" placeholder="Enter the complete title of your research..."
                required style="resize: none;"></textarea>
        </div>

        <div class="form-group">
            <label for="research_area">Scientific Research Area</label>
            <input type="text" id="research_area" name="research_area"
                placeholder="e.g. Computer Vision, Machine Learning, Quantum Computing" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div class="form-group">
                <label for="contact_author_id">Lead/Contact Author ID</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-user-pen"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); opacity: 0.5;"></i>
                    <input type="text" id="contact_author_id" name="contact_author_id" placeholder="e.g. AUTH-42"
                        required style="padding-left: 45px;">
                </div>
            </div>
            <div class="form-group">
                <label for="conference_acronym">Target Conference Acronym</label>
                <div style="position: relative;">
                    <i class="fa-solid fa-calendar-alt"
                        style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); opacity: 0.5;"></i>
                    <input type="text" id="conference_acronym" name="conference_acronym" placeholder="e.g. CVPR2024"
                        required style="padding-left: 45px;">
                </div>
            </div>
        </div>

        <div
            style="margin-top: 3rem; border-top: 1px solid var(--border-color); display: flex; gap: 1rem; padding-top: 2rem;">
            <button type="submit" class="btn" style="flex: 2; padding: 18px;">
                <i class="fa-solid fa-paper-plane" style="margin-right: 8px;"></i>
                Initiate Submission
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-outline" style="flex: 1; padding: 18px;">
                Discard
            </a>
        </div>
    </form>
</div>
{% endblock %}

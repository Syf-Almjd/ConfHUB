{% extends 'base.html' %}

{% block content %}
<div style="margin-bottom: 2rem;">
    <h4 style="color: var(--text-secondary); margin-bottom: 0.5rem;">Analytics</h4>
    <h1>Global Score Lookup</h1>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <form action="{{ url_for('view_article_scores') }}" method="POST">
        <div class="form-group">
            <label for="article_id">Search Article ID</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="article_id" name="article_id" placeholder="Enter ID (e.g. ART-001)"
                    value="{{ article_id or '' }}" required>
                <button type="submit" class="btn" style="padding: 14px 20px;">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>
    </form>

    {% if avg_score is not none %}
    <div style="margin-top: 3rem; text-align: center; animation: fadeIn 0.5s ease-out;">
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">Average Global Score for <strong>{{ article_id
                }}</strong></p>
        <div style="font-size: 5rem; font-weight: 800; letter-spacing: -2px; line-height: 1;">
            {{ avg_score }}<span
                style="font-size: 1.5rem; color: var(--text-secondary); font-weight: 400; margin-left: 5px;">/10.0</span>
        </div>

        <div
            style="margin-top: 2rem; width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden;">
            <div
                style="width: {{ (avg_score / 10 * 100)|round }}%; height: 100%; background: linear-gradient(90deg, #ff4d4d, #00ff88); border-radius: 10px;">
            </div>
        </div>
        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary);">
            Based on current peer review citations
        </p>
    </div>
    {% endif %}
</div>
{% endblock %}
